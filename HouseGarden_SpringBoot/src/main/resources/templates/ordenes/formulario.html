<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Orden - HouseGarden</title>
<link rel="stylesheet" th:href="@{/css/estilos.css}"></head>
<body>
<nav class="navbar"><a class="navbar-brand" th:href="@{/}">🌿 House<span>Garden</span></a>
<ul class="navbar-nav"><li><a th:href="@{/}">Inicio</a></li><li><a th:href="@{/productos}">Productos</a></li>
<li><a th:href="@{/clientes}">Clientes</a></li><li><a th:href="@{/proveedores}">Proveedores</a></li>
<li><a th:href="@{/ordenes}" class="active">Órdenes</a></li></ul></nav>
<div class="container">
    <div class="page-header">
        <h1 class="page-title" th:text="${orden.idOrden == null ? '📋 Nueva Orden' : '✏️ Editar Orden'}"></h1>
        <a th:href="@{/ordenes}" class="btn btn-secondary">← Volver</a>
    </div>
    <div class="card">
        <form th:action="@{/ordenes/guardar}" th:object="${orden}" method="post">
            <input type="hidden" th:field="*{idOrden}">
            <!-- Lista desplegable de clientes desde la base de datos -->
            <div class="form-group"><label>Cliente</label>
                <select th:field="*{cliente}" class="form-control" required>
                    <option value="">-- Seleccione un cliente --</option>
                    <option th:each="cli : ${clientes}"
                            th:value="${cli.idCliente}"
                            th:text="${cli.nombre + ' (' + cli.telefono + ')'}"></option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('cliente')}" th:errors="*{cliente}"></span>
            </div>
            <div class="form-group"><label>Fecha</label>
                <input type="date" th:field="*{fecha}" class="form-control"></div>
            <div class="form-group"><label>Estado</label>
                <select th:field="*{estado}" class="form-control">
                    <option value="Pendiente">Pendiente</option>
                    <option value="Completado">Completado</option>
                    <option value="Cancelado">Cancelado</option>
                </select>
            </div>
            <div class="form-group"><label>Total (COP)</label>
                <input type="number" th:field="*{total}" class="form-control" step="100" min="0"></div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Guardar</button>
                <a th:href="@{/ordenes}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
<footer>&copy; 2026 HouseGarden — SENA — Laura Cómbita &amp; Diana Amaya</footer>
</body></html>
