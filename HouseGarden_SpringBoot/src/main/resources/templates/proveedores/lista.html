<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Proveedores - HouseGarden</title>
<link rel="stylesheet" th:href="@{/css/estilos.css}"></head>
<body>
<nav class="navbar"><a class="navbar-brand" th:href="@{/}">🌿 House<span>Garden</span></a>
<ul class="navbar-nav"><li><a th:href="@{/}">Inicio</a></li><li><a th:href="@{/productos}">Productos</a></li>
<li><a th:href="@{/clientes}">Clientes</a></li><li><a th:href="@{/proveedores}" class="active">Proveedores</a></li>
<li><a th:href="@{/ordenes}">Órdenes</a></li></ul></nav>
<div class="container">
    <div class="page-header">
        <h1 class="page-title">🚚 Proveedores<small>Proveedores del vivero</small></h1>
        <a th:href="@{/proveedores/nuevo}" class="btn btn-primary">+ Nuevo Proveedor</a>
    </div>
    <div class="alert alert-success" th:if="${msg}" th:text="${msg}"></div>
    <div class="table-wrapper"><table>
        <thead><tr><th>#</th><th>Nombre</th><th>Contacto</th><th>Teléfono</th><th>Acciones</th></tr></thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(proveedores)}"><td colspan="5" style="text-align:center;color:#999;padding:2rem;">No hay proveedores.</td></tr>
            <tr th:each="p : ${proveedores}">
                <td th:text="${p.idProveedor}"></td><td><strong th:text="${p.nombre}"></strong></td>
                <td th:text="${p.contacto}"></td><td th:text="${p.telefono}"></td>
                <td class="acciones">
                    <a th:href="@{/proveedores/editar/{id}(id=${p.idProveedor})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/proveedores/eliminar/{id}(id=${p.idProveedor})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table></div>
</div>
<footer>&copy; 2026 HouseGarden — SENA — Laura Cómbita &amp; Diana Amaya</footer>
</body></html>
