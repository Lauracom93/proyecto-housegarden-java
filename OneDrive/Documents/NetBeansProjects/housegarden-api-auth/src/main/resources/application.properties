# Puerto del servidor (diferente al proyecto principal)
server.port=8081
server.servlet.context-path=/api

# Base de datos MySQL - esquema housegarden
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/housegarden?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Hibernate crea la tabla usuarios automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Formato JSON mas legible en las respuestas
spring.jackson.serialization.indent-output=true
